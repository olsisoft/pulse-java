# Single-node StreamFlow engine for the event-mesh topology.
# Here the engine is BOTH the event mesh (native protocol, Pulse connects here)
# AND the Kafka broker (Kafka wire protocol, your stock clients connect here).
node.id=node-1
bootstrap.servers=node-1:streamflow:5679
controller.network.enabled=false
# Native data-plane protocol — what Pulse (remote mode) talks to.
native.protocol.enabled=true
native.protocol.host=0.0.0.0
native.protocol.port=9094
# Kafka front-door ON — this node IS your Kafka broker (the drop-in story).
kafka.protocol.enabled=true
kafka.protocol.host=0.0.0.0
kafka.protocol.port=9092
api.enabled=true
api.port=8080
data.dir=/opt/streamflow/data
